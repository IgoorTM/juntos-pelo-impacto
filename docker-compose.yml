services:
  postgres:
    image: postgres:16-alpine
    container_name: juntos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-juntos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-juntos}
      POSTGRES_DB: ${POSTGRES_DB:-juntos_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-juntos} -d ${POSTGRES_DB:-juntos_dev}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile.dev
    container_name: juntos_backend
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-juntos}:${POSTGRES_PASSWORD:-juntos}@postgres:5432/${POSTGRES_DB:-juntos_dev}
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - ./apps/backend:/repo/apps/backend
      - /repo/node_modules

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile.dev
    container_name: juntos_frontend
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./apps/frontend:/repo/apps/frontend
      - /repo/node_modules

volumes:
  postgres_data:
    name: juntos_postgres_data
